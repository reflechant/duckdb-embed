<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embedded DuckDB Analytics</title>
    
    <!-- DataTables Vendor CSS -->
    <link rel="stylesheet" href="vendor/dataTables.dataTables.min.css">
    <link rel="stylesheet" href="vendor/buttons.dataTables.min.css">
    
    <!-- Custom Dense UI CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>Metrics Explorer</h1>
            <div class="header-actions" id="table-buttons">
                <!-- DataTables Buttons injected here -->
            </div>
        </header>

        <main class="app-main">
            <div class="table-container">
                <table id="metrics-table" class="display compact nowrap" style="width:100%">
                    <thead>
                        <tr>
                            <!-- Populated dynamically by app.js -->
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Populated by DataTables -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Vendor JS -->
    <script src="vendor/jquery.min.js"></script>
    <script src="vendor/dataTables.min.js"></script>
    <script src="vendor/dataTables.buttons.min.js"></script>
    <script src="vendor/jszip.min.js"></script>
    <script src="vendor/pdfmake.min.js"></script>
    <script src="vendor/vfs_fonts.js"></script>
    <script src="vendor/buttons.html5.min.js"></script>

    <!-- App Logic -->
    <script src="js/app.js"></script>
</body>
</html>
